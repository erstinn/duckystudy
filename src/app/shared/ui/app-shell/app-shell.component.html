<div
  class="min-h-dvh px-4 py-4 font-mono md:px-6"
  [ngClass]="
    preferences.theme() === 'light'
      ? 'bg-slate-50 text-slate-900'
      : 'bg-[linear-gradient(180deg,#09101d_0%,#0f1628_100%)] text-slate-100'
  "
>
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div
      class="absolute -left-32 -top-32 h-96 w-96 rounded-full blur-3xl"
      [ngClass]="preferences.theme() === 'light' ? 'bg-teal-200/40' : 'bg-teal-300/10'"
    ></div>
    <div
      class="absolute -bottom-32 -right-32 h-[28rem] w-[28rem] rounded-full blur-3xl"
      [ngClass]="preferences.theme() === 'light' ? 'bg-amber-200/40' : 'bg-amber-300/10'"
    ></div>
  </div>

  <header
    class="relative z-10 mx-auto mb-6 flex max-w-7xl flex-col gap-4 rounded-[1.75rem] border px-5 py-5 backdrop-blur md:flex-row md:items-center md:justify-between"
    [ngClass]="
      preferences.theme() === 'light'
        ? 'border-slate-200 bg-white/80'
        : 'border-white/10 bg-slate-950/40'
    "
  >
    <a class="flex items-center gap-3 no-underline" routerLink="/study">
      <span
        class="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-teal-300 to-amber-300 font-bold text-slate-950"
        >DS</span
      >
      <div>
        <div class="mb-1 text-[11px] uppercase tracking-[0.18em] text-slate-400">Language drills</div>
        <div class="font-['Playfair_Display'] text-2xl">DuckyStudy</div>
      </div>
    </a>

    <nav class="flex flex-wrap gap-2" aria-label="Primary">
      <a
        class="rounded-full border px-4 py-2 text-sm transition"
        [ngClass]="
          preferences.theme() === 'light'
            ? 'border-slate-200 text-slate-600 hover:border-teal-300 hover:text-slate-900'
            : 'border-white/10 text-slate-400 hover:border-teal-300/40 hover:text-slate-100'
        "
        routerLink="/study"
        routerLinkActive="border-teal-300/50 bg-teal-300/10 !text-inherit"
        >Study</a
      >
      <a
        class="rounded-full border px-4 py-2 text-sm transition"
        [ngClass]="
          preferences.theme() === 'light'
            ? 'border-slate-200 text-slate-600 hover:border-teal-300 hover:text-slate-900'
            : 'border-white/10 text-slate-400 hover:border-teal-300/40 hover:text-slate-100'
        "
        routerLink="/cards"
        routerLinkActive="border-teal-300/50 bg-teal-300/10 !text-inherit"
        >Cards</a
      >
      <a
        class="rounded-full border px-4 py-2 text-sm transition"
        [ngClass]="
          preferences.theme() === 'light'
            ? 'border-slate-200 text-slate-600 hover:border-teal-300 hover:text-slate-900'
            : 'border-white/10 text-slate-400 hover:border-teal-300/40 hover:text-slate-100'
        "
        routerLink="/settings"
        routerLinkActive="border-teal-300/50 bg-teal-300/10 !text-inherit"
        >Settings</a
      >
    </nav>

    <div class="flex flex-col gap-1 text-sm text-slate-400 md:text-right">
      <span>{{ preferences.uiLanguage() === 'ja' ? '日本語 UI' : 'English UI' }}</span>
      <span>{{ preferences.dailyGoal() }} / day</span>
    </div>
  </header>

  <main class="relative z-10 mx-auto max-w-7xl">
    <router-outlet />
  </main>
</div>
